 <!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistem Rumah Sakit MITRA KELUARGA</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#eaf6ff,#f8fcff);
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.header{
    display:flex;
    align-items:center;
    gap:20px;
    margin-bottom:25px;
    border-bottom:3px solid #2196f3;
    padding-bottom:15px;
}

.logo{
    width:90px;
    height:90px;
    object-fit:contain;
}

.header h1{
    color:#2196f3;
}

.header p{
    color:#666;
}

.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    margin-bottom:20px;
}

.stat-card{
    background:#2196f3;
    color:white;
    padding:15px;
    text-align:center;
    border-radius:15px;
}

.stat-card h2{
    font-size:30px;
}

.form-box{
    margin-top:20px;
}

input,
textarea,
select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    margin-bottom:12px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#2196f3;
    color:white;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1976d2;
}

.card{
    background:white;
    border-left:6px solid #2196f3;
    border-radius:12px;
    padding:15px;
    margin-top:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.priority{
    color:white;
    padding:5px 10px;
    border-radius:20px;
    display:inline-block;
    margin-top:8px;
}

.delete-btn{
    background:#dc3545;
    width:auto;
    margin-top:10px;
    padding:8px 15px;
}

.search{
    margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

```
<div class="header">
    <img src="logo.png" class="logo">

    <div>
        <h1>RUMAH SAKIT MITRA KELUARGA</h1>
        <p>Kami siap Melayani Anda</p>
    </div>
</div>

<div class="stats">

    <div class="stat-card">
        <h2 id="totalPatients">0</h2>
        <p>Total Pasien</p>
    </div>

    <div class="stat-card">
        <h2 id="highPriority">0</h2>
        <p>Prioritas Tinggi</p>
    </div>

    <div class="stat-card">
        <h2 id="queueCount">0</h2>
        <p>Dalam Antrian</p>
    </div>

</div>

<div class="form-box">

    <h3>Tambah Pasien</h3>

    <input type="text" id="name" placeholder="Nama Pasien">

    <input type="number" id="age" placeholder="Umur">

    <textarea id="symptoms" placeholder="Keluhan Penyakit"></textarea>

    <select id="urgency">
        <option value="low">Rendah</option>
        <option value="medium">Sedang</option>
        <option value="high">Tinggi</option>
    </select>

    <button onclick="addPatient()">
        Tambah Pasien
    </button>

</div>

<input
    class="search"
    type="text"
    id="searchPatient"
    placeholder="Cari nama pasien..."
    onkeyup="searchPatient()">

<h3 style="margin-top:20px;">
    Daftar Antrian
</h3>

<div id="queue"></div>
```

</div>

<script>

class PatientNode{
    constructor(patient){
        this.patient = patient;
        this.next = null;
    }
}

let head = null;
let queueNumber = 1;

function addPatient(){

    const patient = {

        id:"A"+String(queueNumber).padStart(3,'0'),

        name:document.getElementById("name").value,

        age:document.getElementById("age").value,

        symptoms:document.getElementById("symptoms").value,

        urgency:document.getElementById("urgency").value,

        date:new Date().toLocaleString()

    };

    queueNumber++;

    const newNode = new PatientNode(patient);

    if(head === null){

        head = newNode;

    }else{

        let current = head;

        while(current.next !== null){
            current = current.next;
        }

        current.next = newNode;
    }

    displayQueue();

    document.getElementById("name").value="";
    document.getElementById("age").value="";
    document.getElementById("symptoms").value="";
}

function deletePatient(id){

    if(head === null) return;

    if(head.patient.id === id){
        head = head.next;
        displayQueue();
        return;
    }

    let current = head;

    while(current.next !== null){

        if(current.next.patient.id === id){
            current.next = current.next.next;
            break;
        }

        current = current.next;
    }

    displayQueue();
}

function displayQueue(){

    let html="";
    let current=head;

    let total=0;
    let high=0;

    while(current !== null){

        total++;

        let color="#28a745";

        if(current.patient.urgency==="medium"){
            color="#ffc107";
        }

        if(current.patient.urgency==="high"){
            color="#dc3545";
            high++;
        }

        html += `
        <div class="card">

            <h3>No Antrian ${current.patient.id}</h3>

            <b>${current.patient.name}</b><br><br>

            Umur : ${current.patient.age}<br>

            Keluhan : ${current.patient.symptoms}<br>

            Waktu Daftar : ${current.patient.date}<br><br>

            <span class="priority"
            style="background:${color}">
            ${current.patient.urgency.toUpperCase()}
            </span>

            <br>

            <button
            class="delete-btn"
            onclick="deletePatient('${current.patient.id}')">
            Layani Pasien
            </button>

        </div>
        `;

        current=current.next;
    }

    document.getElementById("queue").innerHTML=html;

    document.getElementById("totalPatients").innerText=total;
    document.getElementById("highPriority").innerText=high;
    document.getElementById("queueCount").innerText=total;
}

function searchPatient(){

    let keyword =
    document.getElementById("searchPatient")
    .value
    .toLowerCase();

    let cards =
    document.querySelectorAll(".card");

    cards.forEach(card=>{

        if(card.innerText.toLowerCase().includes(keyword)){
            card.style.display="block";
        }else{
            card.style.display="none";
        }

    });
}

</script>

</body>
</html>
